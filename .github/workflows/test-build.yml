name: Test build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Read .nvmrc
        run: echo "NVMRC=$(cat .nvmrc)" >> $GITHUB_ENV

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '${{ env.NVMRC }}'
          cache: 'pnpm'

      - name: Set up dependencies
        run: pnpm i --frozen-lockfile

      - name: Build
        uses: ./.github/actions/build

      - name: Build docs
        run: pnpm generateDocs

      - name: Pack packages
        run: |
          mkdir -p packed
          for pkg in protocol sdk ui ui-react isomorphic-fetch isomorphic-eventsource; do
            (cd packages/$pkg && pnpm pack --pack-destination ../../packed)
          done

      - name: Upload packed packages
        uses: actions/upload-artifact@v4
        with:
          name: tonconnect-packages
          path: packed/*.tgz
          if-no-files-found: error
